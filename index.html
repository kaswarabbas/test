<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grand IVA Hotel - Digital Newspaper Portal</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

/* Background (more visible, lighter blur) */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("background.jpg") no-repeat center center;
    background-size:cover;
    filter:blur(4px);
    transform:scale(1.05);
    z-index:-2;
}

/* lighter overlay so image is visible */
body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
    z-index:-1;
}

/* CENTER CONTAINER SMALL */
.container{
    width:520px;
    max-width:90%;
    background:rgba(255,255,255,0.92);
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

.logo img{
    width:180px;
    height:auto;
}

h1{
    color:#0b4f6c;
    margin:10px 0 5px;
}

h2{
    color:#666;
    margin:0 0 15px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:20px;
}

a.card{
    display:block;
    text-decoration:none;
    background:#0b4f6c;
    color:#fff;
    padding:18px;
    border-radius:10px;
    font-size:16px;
    transition:.3s;
}

a.card:hover{
    background:#117399;
    transform:translateY(-3px);
}

/* FOOTER */
.footer{
    margin-top:20px;
    font-size:13px;
    color:#333;
    line-height:1.6;
    border-top:1px solid #ddd;
    padding-top:12px;
}

.footer a{
    color:#0b4f6c;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="Grand IVA Hotel Logo">
    </div>

    <h1>Digital Newspaper Portal</h1>
    <h2>بوابة الصحف الرقمية</h2>

    <div class="grid">

        <a class="card" href="https://www.okaz.com.sa" target="_blank">Okaz</a>
        <a class="card" href="https://www.alriyadh.com" target="_blank">Al Riyadh</a>
        <a class="card" href="https://aawsat.com" target="_blank">Asharq Al-Awsat</a>
        <a class="card" href="https://www.alwatan.com.sa" target="_blank">Al Watan</a>

    </div>

    <div class="footer">
        <div><strong>Grand IVA Hotel Abha</strong></div>
        <div>📍 7118, 5429, Abu Huraira Road, Abha, KSA - 62527</div>
        <div>☎ <a href="tel:+966172859996">+966 17 285 9996</a></div>
    </div>

</div>

</body>
</html>
